name: Weekly Debate Deep Dive

on:
  schedule:
    # 2:00 PM UTC every Satruday. Adjust day/time as needed — see README.
    - cron: "0 14 * * 6"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch sources (last 7 days)
        run: python fetch.py --since-hours 168 --out raw_stories_weekly.json

      - name: Synthesize weekly deep dive
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python synthesize.py --in raw_stories_weekly.json --mode weekly

      - name: Send email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          BRIEFING_FROM_EMAIL: ${{ secrets.BRIEFING_FROM_EMAIL }}
          BRIEFING_TO_EMAIL: ${{ secrets.BRIEFING_TO_EMAIL }}
        run: python send_email.py --in briefings/_latest_weekly.md --mode weekly

      - name: Commit archived briefing
        run: |
          git config user.name "debate-briefing-bot"
          git config user.email "actions@github.com"
          git add briefings/
          git diff --quiet --cached || git commit -m "Weekly deep dive $(date -u +%Y-%m-%d)"
          # Pull any commits made by a concurrently-running workflow (e.g. the
          # daily briefing) before pushing, to avoid a rejected push if both
          # happen to run around the same time. Rebase keeps history linear.
          git pull --rebase origin main
          git push
